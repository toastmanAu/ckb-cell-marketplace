name: Deploy

on:
  push:
    branches: [master]

# Only one deploy at a time — if a second push arrives while the first
# is still deploying, cancel the first. Prevents race conditions on
# CF Pages where two deploys land seconds apart and the earlier one
# "wins" the production slot.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend → CF Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=cellswap --branch=production --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  worker:
    name: Worker → CF Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if worker files changed
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- worker/ | wc -l)
          if [ "$CHANGED" -gt 0 ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.deploy == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
        if: steps.changed.outputs.deploy == 'true'

      - name: Deploy to Cloudflare Workers
        if: steps.changed.outputs.deploy == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
